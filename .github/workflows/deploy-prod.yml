name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Terraform init
        working-directory: infra
        run: terraform init -upgrade

      - name: Select prod workspace
        working-directory: infra
        run: terraform workspace select prod 2>/dev/null || terraform workspace new prod

      - name: Build Lambda package
        run: bash scripts/build-lambda.sh

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
        run: terraform apply -var-file="env/prod.tfvars" -auto-approve

      - name: Get Terraform outputs
        id: tf
        working-directory: infra
        run: |
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url)" >> "$GITHUB_OUTPUT"

      - name: Seed admin user
        env:
          API_URL: ${{ steps.tf.outputs.api_url }}
          ADMIN_PASSWORD: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
        run: npm run seed-admin -w backend

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ steps.tf.outputs.api_url }}
        run: npm run build -w frontend

      - name: Deploy frontend to S3
        env:
          FRONTEND_BUCKET: ${{ steps.tf.outputs.frontend_bucket }}
        run: |
          aws s3 sync frontend/dist/ "s3://$FRONTEND_BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html "s3://$FRONTEND_BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Summary
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Frontend:** ${{ steps.tf.outputs.frontend_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **API:** ${{ steps.tf.outputs.api_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
